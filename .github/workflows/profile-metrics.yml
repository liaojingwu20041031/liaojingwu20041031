name: Refresh profile metrics

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate a refined contribution animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/contribution-snake-light.svg?color_snake=#2563eb&color_dots=#f8fafc,#e0f2fe,#bae6fd,#7dd3fc,#38bdf8

      - name: Render the light GitHub signal panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
        run: python scripts/generate_profile_metrics.py

      - name: Commit refreshed panels when data changed
        shell: bash
        run: |
          if git diff --quiet -- assets; then
            echo "Profile metrics are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          git commit -m "chore: refresh profile metrics"
          git push
